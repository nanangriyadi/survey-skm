<!DOCTYPE html>
<html lang="id" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin — SKM SLB Negeri Badegan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600&display=swap"
      rel="stylesheet" />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #f5f7fa;
        color: #1a202c;
        transition: background 0.3s, color 0.3s;
      }
      [data-theme="dark"] body {
        background: #0f172a;
        color: #f1f5f9;
      }
      [data-theme="dark"] .login-card {
        background: #1e293b !important;
        border-color: #2d3f55 !important;
      }
      [data-theme="dark"] input {
        background: #263347 !important;
        border-color: #2d3f55 !important;
        color: #f1f5f9 !important;
      }
      [data-theme="dark"] .text-slate-700 {
        color: #cbd5e1 !important;
      }
      [data-theme="dark"] .text-slate-500 {
        color: #94a3b8 !important;
      }
      .font-display {
        font-family: "Playfair Display", serif;
      }

      /* Animasi getar saat password salah */
      .shake {
        animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }
      @keyframes shake {
        10%,
        90% {
          transform: translate3d(-1px, 0, 0);
        }
        20%,
        80% {
          transform: translate3d(2px, 0, 0);
        }
        30%,
        50%,
        70% {
          transform: translate3d(-4px, 0, 0);
        }
        40%,
        60% {
          transform: translate3d(4px, 0, 0);
        }
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4 relative">
    <button
      onclick="toggleTheme()"
      class="absolute top-6 right-6 w-10 h-10 rounded-full bg-white border border-slate-200 shadow-sm flex items-center justify-center text-slate-600 transition-colors hover:bg-slate-50"
      style="z-index: 50">
      <svg
        id="sunI"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2">
        <circle cx="12" cy="12" r="5" />
        <path
          d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
      </svg>
      <svg
        id="moonI"
        class="hidden"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>

    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div
          class="w-16 h-16 mx-auto rounded-2xl flex items-center justify-center shadow-lg mb-4"
          style="background: linear-gradient(135deg, #1b4f72, #154360)">
          <svg
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
            <path d="M6 12v5c3 3 9 3 12 0v-5" />
          </svg>
        </div>
        <h1 class="font-display text-2xl font-bold text-slate-800">
          Panel Admin SKM
        </h1>
        <p class="text-slate-500 text-sm mt-1">SLB Negeri Badegan Ponorogo</p>
      </div>

      <form
        id="loginForm"
        class="login-card bg-white p-8 rounded-2xl shadow-xl border border-slate-100"
        onsubmit="handleLogin(event)">
        <div
          id="errorMsg"
          class="hidden mb-5 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg flex items-center gap-2 font-medium">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            class="flex-shrink-0">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span id="errorText"></span>
        </div>

        <div class="mb-5">
          <label class="block text-sm font-semibold text-slate-700 mb-2"
            >Username</label
          >
          <input
            type="text"
            id="username"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-navy-600 focus:ring-1 focus:ring-navy-600 transition-colors text-slate-800"
            placeholder="Ketik admin"
            style="focus:border-color:#1B4F72"
            required />
        </div>

        <div class="mb-6 relative">
          <label class="block text-sm font-semibold text-slate-700 mb-2"
            >Password</label
          >
          <input
            type="password"
            id="password"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-navy-600 focus:ring-1 focus:ring-navy-600 transition-colors text-slate-800"
            placeholder="Ketik admin123"
            required />
          <button
            type="button"
            onclick="togglePass()"
            class="absolute right-4 top-[38px] text-slate-400 hover:text-slate-600 transition-colors">
            <svg
              id="eyeOpen"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg
              id="eyeClose"
              class="hidden"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2">
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>

        <button
          type="submit"
          id="btnSubmit"
          class="w-full py-3 px-4 text-white font-bold rounded-xl transition-colors flex justify-center items-center gap-2"
          style="background: #1b4f72">
          <span id="btnText">Masuk ke Dashboard</span>
        </button>

        <div class="mt-6 text-center">
          <a
            href="index.html"
            class="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors"
            >&larr; Kembali ke Beranda Publik</a
          >
        </div>
      </form>
    </div>

    <script>
      // --- 1. Keamanan Sederhana: Bypass Login jika sesi masih ada ---
      if (localStorage.getItem("skm_admin_auth") === "true") {
        window.location.href = "admin-dashboard.html";
      }

      // --- 2. Fungsi Eksekusi Login ---
      function handleLogin(e) {
        e.preventDefault(); // Mencegah form memuat ulang halaman

        const btn = document.getElementById("btnSubmit");
        const txt = document.getElementById("btnText");
        const err = document.getElementById("errorMsg");
        const form = document.getElementById("loginForm");

        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        // Ubah tombol jadi "Loading"
        btn.disabled = true;
        btn.style.opacity = "0.7";
        txt.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Memeriksa...`;
        err.classList.add("hidden");

        // Simulasi delay cek database (800ms)
        setTimeout(() => {
          if (user === "admin" && pass === "admin123") {
            // Login Berhasil -> Simpan Autentikasi -> Pindah Halaman
            localStorage.setItem("skm_admin_auth", "true");
            window.location.href = "admin-dashboard.html";
          } else {
            // Login Gagal
            err.classList.remove("hidden");
            document.getElementById("errorText").textContent =
              "Username atau password salah. Silakan coba lagi.";

            // Efek Animasi Getar pada Form
            form.classList.remove("shake");
            void form.offsetWidth; // Trigger reflow agar animasi bisa diulang
            form.classList.add("shake");

            // Kembalikan Tombol seperti semula
            btn.disabled = false;
            btn.style.opacity = "1";
            txt.textContent = "Masuk ke Dashboard";
          }
        }, 800);
      }

      // --- 3. Fungsi Intip Password ---
      function togglePass() {
        const inp = document.getElementById("password");
        const isPass = inp.type === "password";
        inp.type = isPass ? "text" : "password";
        document.getElementById("eyeOpen").classList.toggle("hidden", isPass);
        document.getElementById("eyeClose").classList.toggle("hidden", !isPass);
      }

      // --- 4. Fungsi Tema Terang / Gelap ---
      function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute("data-theme") === "dark";
        html.setAttribute("data-theme", isDark ? "light" : "dark");
        document.getElementById("sunI").classList.toggle("hidden", !isDark);
        document.getElementById("moonI").classList.toggle("hidden", isDark);
        localStorage.setItem("theme", isDark ? "light" : "dark");
      }

      // Cek memori tema saat halaman pertama dimuat
      const savedTheme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
      if (savedTheme === "dark") {
        document.getElementById("sunI").classList.add("hidden");
        document.getElementById("moonI").classList.remove("hidden");
      }
    </script>
  </body>
</html>
